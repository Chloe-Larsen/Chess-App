<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>JS Chess Game</title>
    <link rel="stylesheet" href="page.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <div id="game">
        <div class="cellPre">8</div>
        <div class="cell" id="1_8"></div>
        <div class="cell black" id="2_8"></div>
        <div class="cell" id="3_8"></div>
        <div class="cell black" id="4_8"></div>
        <div class="cell" id="5_8"></div>
        <div class="cell black" id="6_8"></div>
        <div class="cell" id="7_8"></div>
        <div class="cell black" id="8_8"></div>

        <div class="cellPre">7</div>
        <div class="cell black" id="1_7"></div>
        <div class="cell" id="2_7"></div>
        <div class="cell black" id="3_7"></div>
        <div class="cell" id="4_7"></div>
        <div class="cell black" id="5_7"></div>
        <div class="cell" id="6_7"></div>
        <div class="cell black" id="7_7"></div>
        <div class="cell" id="8_7"></div>

        <div class="cellPre">6</div>
        <div class="cell" id="1_6"></div>
        <div class="cell black" id="2_6"></div>
        <div class="cell" id="3_6"></div>
        <div class="cell black" id="4_6"></div>
        <div class="cell" id="5_6"></div>
        <div class="cell black" id="6_6"></div>
        <div class="cell" id="7_6"></div>
        <div class="cell black" id="8_6"></div>

        <div class="cellPre">5</div>
        <div class="cell black" id="1_5"></div>
        <div class="cell" id="2_5"></div>
        <div class="cell black" id="3_5"></div>
        <div class="cell" id="4_5"></div>
        <div class="cell black" id="5_5"></div>
        <div class="cell" id="6_5"></div>
        <div class="cell black" id="7_5"></div>
        <div class="cell" id="8_5"></div>

        <div class="cellPre">4</div>
        <div class="cell" id="1_4"></div>
        <div class="cell black" id="2_4"></div>
        <div class="cell" id="3_4"></div>
        <div class="cell black" id="4_4"></div>
        <div class="cell" id="5_4"></div>
        <div class="cell black" id="6_4"></div>
        <div class="cell" id="7_4"></div>
        <div class="cell black" id="8_4"></div>

        <div class="cellPre">3</div>
        <div class="cell black" id="1_3"></div>
        <div class="cell" id="2_3"></div>
        <div class="cell black" id="3_3"></div>
        <div class="cell" id="4_3"></div>
        <div class="cell black" id="5_3"></div>
        <div class="cell" id="6_3"></div>
        <div class="cell black" id="7_3"></div>
        <div class="cell" id="8_3"></div>

        <div class="cellPre">2</div>
        <div class="cell" id="1_2"></div>
        <div class="cell black" id="2_2"></div>
        <div class="cell" id="3_2"></div>
        <div class="cell black" id="4_2"></div>
        <div class="cell" id="5_2"></div>
        <div class="cell black" id="6_2"></div>
        <div class="cell" id="7_2"></div>
        <div class="cell black" id="8_2"></div>

        <div class="cellPre">1</div>
        <div class="cell black" id="1_1"></div>
        <div class="cell" id="2_1"></div>
        <div class="cell black" id="3_1"></div>
        <div class="cell" id="4_1"></div>
        <div class="cell black" id="5_1"></div>
        <div class="cell" id="6_1"></div>
        <div class="cell black" id="7_1"></div>
        <div class="cell" id="8_1"></div>

        <div class="cellPre"></div>
        <div class="cellPre">a</div>
        <div class="cellPre">b</div>
        <div class="cellPre">c</div>
        <div class="cellPre">d</div>
        <div class="cellPre">e</div>
        <div class="cellPre">f</div>
        <div class="cellPre">g</div>
        <div class="cellPre">h</div>
    </div>

    <div id="sidebar">
        <div id="turn">It's Whites Turn</div>
        <div id="clock">
            <div class="clock-display">
                <span class="clock-label">White</span>
                <span id="white-clock" class="clock-time">10:00</span>
            </div>
            <div class="clock-display">
                <span class="clock-label">Black</span>
                <span id="black-clock" class="clock-time">10:00</span>
            </div>
        </div>
        <button id="restartBtn">New Game</button>
    </div>

    <div id="promotion-dialog"
        style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; text-align: center;">
        <h3>Promote Pawn</h3>
        <p>Choose a piece to promote to:</p>
        <div id="promotion-options" style="display: flex; gap: 10px; justify-content: center; padding: 10px;">
            <!-- Options will be dynamically added -->
        </div>
    </div>
    <div id="promotion-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;">
    </div>
    <script src="page.js"></script>
</body>

</html>
